name: Claude

# Lets you (or the review bot) say "@claude ..." on an issue or PR to have
# Claude push fixes to the PR branch. Re-pushing re-triggers CI + review.
on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]
  pull_request_review:
    types: [submitted]

jobs:
  respond:
    # Only run when a human @-mentions claude (avoids reacting to bot output).
    if: |
      (github.event.comment != null && contains(github.event.comment.body, '@claude') && github.event.comment.user.type != 'Bot') ||
      (github.event.review != null && contains(github.event.review.body, '@claude') && github.event.review.user.type != 'Bot')
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}

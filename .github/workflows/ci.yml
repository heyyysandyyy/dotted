name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  api:
    name: Rails tests
    runs-on: ubuntu-latest

    services:
      db:
        image: postgres:17
        env:
          POSTGRES_USER: myapp
          POSTGRES_PASSWORD: password
          POSTGRES_DB: myapp_test
        ports: ["5432:5432"]
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5

    defaults:
      run:
        working-directory: api

    env:
      RAILS_ENV: test
      DB_USERNAME: myapp
      DB_PASSWORD: password
      DB_HOST: localhost

    steps:
      - uses: actions/checkout@v7

      - uses: ruby/setup-ruby@v1
        with:
          working-directory: api
          bundler-cache: true

      - name: Set up database
        run: bin/rails db:schema:load

      - name: Run tests
        run: bin/rails test

      - name: Lint
        run: bin/rubocop --parallel

      - name: Security audit
        run: |
          bin/brakeman --no-pager
          bin/bundler-audit check --update

  web:
    name: React lint & build
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: web

    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v6
        with:
          node-version-file: .tool-versions
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Audit (npm advisories)
        run: npm run audit

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm test -- --run --passWithNoTests

      - name: Build
        run: npm run build

name: Claude Review

# Soft gate: independent review of every PR against the ticket's acceptance
# criteria, the dotted architecture rules, and a security pass.
on:
  pull_request:
    types: [opened, synchronize, ready_for_review]

# Don't pile up reviews when a PR is pushed to rapidly.
concurrency:
  group: claude-review-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  review:
    if: github.event.pull_request.draft == false
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          prompt: |
            Review this pull request by running the /review-dotted skill.
            Read the ticket id from the branch name and its acceptance criteria
            from CLAUDE.md. Post inline comments and end with the summary block
            and an APPROVE / REQUEST_CHANGES verdict. Do not merge.

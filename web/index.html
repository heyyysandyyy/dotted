<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>web</title>
    <script>
      // Applied synchronously, before first paint, so the page never flashes
      // the wrong theme while React boots (UX-026). Mirrors useThemeStore's
      // own initialTheme() logic — stored choice wins, else OS preference.
      (function () {
        try {
          var stored = localStorage.getItem('dotted:theme')
          var dark = stored === 'dark' || (stored !== 'light' && window.matchMedia('(prefers-color-scheme: dark)').matches)
          if (dark) document.documentElement.classList.add('dark')
        } catch (e) {}
      })()
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
